(% extends 'tapasapp/base.html'%)
(% load static %)

<!DOCTYPE html>
<html lang = "en"> 
<head> 
    <meta charset = "UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tapas Menu </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">    
</head>
<body> 
    {% block content %}
    <div style = "background-color: #4e0909; color: white; padding: 10px;">
        <h2>My Tapas Menu</h2>
    </div>
    <div class = "container mt-5"> 
        <div class = "card"> 
            <div class = "card-body">
                <h3>Type in Dish Details:</h3>
                <form> 
                    <label>Name:</label>
                    <input type = "text" class = "form-control" name = "dishname"> 
                    <br> 
                    <label>Cook Time:</label>
                    <input type = "text" class = "form-control" name="cookingtime">
                    <br> 
                    <label>Prep Time:</label>
                    <input type = "text" class = "form-control" name = "preptime">
                    <br> 
                    <button type = "submit" class = "btn btn-secondary">Add to dishes</button>
                </form>
            </div>
        </div>
    </div>
    <div style = "background-color: #4e0909; color: white; text-align: center; padding: 15px; position: fixed; width: 100%;">
        @ 2020
    </div>
    {% endblock %} 
</body>
</html>
